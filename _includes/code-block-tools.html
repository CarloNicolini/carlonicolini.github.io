<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
.code-block-wrap { position: relative; margin-bottom: 1.5rem; }
.post-content h1, .post-content h2, .post-content h3, .post-content h4, .post-content h5, .post-content h6,
.pubdetail-content h1, .pubdetail-content h2, .pubdetail-content h3, .pubdetail-content h4, .pubdetail-content h5, .pubdetail-content h6 {
  scroll-margin-top: 96px;
}
.post-content h1:hover .heading-anchor,
.post-content h2:hover .heading-anchor,
.post-content h3:hover .heading-anchor,
.post-content h4:hover .heading-anchor,
.post-content h5:hover .heading-anchor,
.post-content h6:hover .heading-anchor,
.pubdetail-content h1:hover .heading-anchor,
.pubdetail-content h2:hover .heading-anchor,
.pubdetail-content h3:hover .heading-anchor,
.pubdetail-content h4:hover .heading-anchor,
.pubdetail-content h5:hover .heading-anchor,
.pubdetail-content h6:hover .heading-anchor,
.post-content h1:focus-within .heading-anchor,
.post-content h2:focus-within .heading-anchor,
.post-content h3:focus-within .heading-anchor,
.post-content h4:focus-within .heading-anchor,
.post-content h5:focus-within .heading-anchor,
.post-content h6:focus-within .heading-anchor,
.pubdetail-content h1:focus-within .heading-anchor,
.pubdetail-content h2:focus-within .heading-anchor,
.pubdetail-content h3:focus-within .heading-anchor,
.pubdetail-content h4:focus-within .heading-anchor,
.pubdetail-content h5:focus-within .heading-anchor,
.pubdetail-content h6:focus-within .heading-anchor { opacity: 1; }
.heading-anchor {
  display: inline-flex;
  align-items: center;
  margin-left: 0.35em;
  opacity: 0;
  font-size: 0.8em;
  line-height: 1;
  text-decoration: none;
  color: inherit;
  transition: opacity 0.15s ease, transform 0.15s ease;
}
.heading-anchor:hover { text-decoration: none; transform: translateY(-1px); }
.heading-anchor.copied { opacity: 1; }
.code-block-toolbar {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 0.25rem;
  padding: 0.35rem 0.5rem;
  background: #e8eaed;
  border: 1px solid #e1e4e8;
  border-bottom: none;
  border-radius: 6px 6px 0 0;
  font-family: system-ui, sans-serif;
}
.code-block-toolbar .code-block-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  padding: 0;
  border: none;
  border-radius: 4px;
  background: transparent;
  cursor: pointer;
  color: #5f6368;
}
.code-block-toolbar .code-block-btn:hover { background: #d2d4d6; color: #202124; }
.code-block-toolbar .code-block-btn .material-icons { font-size: 18px; }
.code-block-toolbar .code-block-btn.copied { background: #e6f4ea; color: #137333; }
.code-block-toolbar .code-block-btn.active { background: #c5c9ce; color: #202124; }
.code-block-body { display: flex; border: 1px solid #e1e4e8; border-radius: 0 0 6px 6px; overflow: hidden; }
.code-block-body.with-linenos { border-radius: 0; }
.code-block-wrap .code-block-toolbar + .code-block-body { border-top: none; border-radius: 0 0 6px 6px; }
.code-line-numbers {
  flex: 0 0 auto;
  padding: 1rem 0.75rem 1rem 1.25rem;
  background: #eff1f3;
  color: #57606a;
  font-family: "SF Mono", "Fira Code", Consolas, Monaco, monospace;
  font-size: 1.125rem;
  line-height: 1.5;
  user-select: none;
  text-align: right;
  border-right: 1px solid #e1e4e8;
}
.code-line-numbers span { display: block; }
.code-block-body .highlight { margin: 0; border-radius: 0; border: none; }
.code-block-body .highlight pre { border-radius: 0; }
</style>
<script>
(function() {
  var STORAGE_KEY = 'carlonicolini-code-linenos';
  function getLinenosPref() { try { return sessionStorage.getItem(STORAGE_KEY) !== '0'; } catch (e) { return true; } }
  function setLinenosPref(v) { try { sessionStorage.setItem(STORAGE_KEY, v ? '1' : '0'); } catch (e) {} }
  function getCodeText(code) {
    return (code.textContent || '').replace(/\r\n?/g, '\n').replace(/\n$/, '');
  }

  function initCodeBlocks() {
    var blocks = document.querySelectorAll('.highlighter-rouge');
    blocks.forEach(function(outer) {
      if (outer.querySelector('.code-block-toolbar')) return;
      var highlight = outer.querySelector('.highlight');
      if (!highlight) return;
      var pre = highlight.querySelector('pre');
      var code = highlight.querySelector('code');
      if (!pre || !code) return;

      var wrap = document.createElement('div');
      wrap.className = 'code-block-wrap';

      var toolbar = document.createElement('div');
      toolbar.className = 'code-block-toolbar';

      var copyBtn = document.createElement('button');
      copyBtn.type = 'button';
      copyBtn.className = 'code-block-btn code-block-copy';
      copyBtn.setAttribute('aria-label', 'Copy code');
      var copyIcon = document.createElement('span');
      copyIcon.className = 'material-icons';
      copyIcon.textContent = 'content_copy';
      copyBtn.appendChild(copyIcon);
      copyBtn.addEventListener('click', function() {
        var text = getCodeText(code);
        navigator.clipboard.writeText(text).then(function() {
          copyIcon.textContent = 'check';
          copyBtn.classList.add('copied');
          setTimeout(function() { copyIcon.textContent = 'content_copy'; copyBtn.classList.remove('copied'); }, 1800);
        });
      });

      var lineCheck = document.createElement('input');
      lineCheck.type = 'checkbox';
      lineCheck.checked = getLinenosPref();
      lineCheck.className = 'code-block-linenos-check';
      lineCheck.setAttribute('aria-hidden', 'true');
      lineCheck.style.cssText = 'position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;';
      var lineBtn = document.createElement('button');
      lineBtn.type = 'button';
      lineBtn.className = 'code-block-btn';
      lineBtn.setAttribute('aria-label', 'Toggle line numbers');
      var lineIcon = document.createElement('span');
      lineIcon.className = 'material-icons';
      lineIcon.textContent = 'format_list_numbered';
      lineBtn.appendChild(lineIcon);
      lineBtn.addEventListener('click', function() {
        lineCheck.checked = !lineCheck.checked;
        updateLinenos(lineCheck.checked);
        lineBtn.classList.toggle('active', lineCheck.checked);
      });

      var body = document.createElement('div');
      body.className = 'code-block-body';

      var lineCount = getCodeText(code).split('\n').length;
      var lineNumbers = document.createElement('div');
      lineNumbers.className = 'code-line-numbers';
      lineNumbers.setAttribute('aria-hidden', 'true');
      for (var i = 1; i <= lineCount; i++) {
        var s = document.createElement('span');
        s.textContent = i;
        lineNumbers.appendChild(s);
      }

      function updateLinenos(show) {
        setLinenosPref(show);
        lineNumbers.style.display = show ? 'block' : 'none';
        body.classList.toggle('with-linenos', show);
      }

      updateLinenos(lineCheck.checked);
      lineBtn.classList.toggle('active', lineCheck.checked);

      toolbar.appendChild(copyBtn);
      toolbar.appendChild(lineCheck);
      toolbar.appendChild(lineBtn);
      body.appendChild(lineNumbers);
      body.appendChild(highlight);
      wrap.appendChild(toolbar);
      wrap.appendChild(body);
      outer.appendChild(wrap);
    });
  }

  function initHeadingPermalinks() {
    var headings = document.querySelectorAll('.post-content h1, .post-content h2, .post-content h3, .post-content h4, .post-content h5, .post-content h6, .pubdetail-content h1, .pubdetail-content h2, .pubdetail-content h3, .pubdetail-content h4, .pubdetail-content h5, .pubdetail-content h6');
    headings.forEach(function(heading) {
      if (heading.querySelector('.heading-anchor')) return;
      if (!heading.id) return;

      var anchor = document.createElement('a');
      anchor.className = 'heading-anchor';
      anchor.href = '#' + heading.id;
      anchor.setAttribute('aria-label', 'Copy link to this section');
      anchor.title = 'Copy link to this section';
      anchor.textContent = '¶';
      anchor.addEventListener('click', function(event) {
        event.preventDefault();
        var url = window.location.href.split('#')[0] + '#' + heading.id;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(function() {
            anchor.classList.add('copied');
            setTimeout(function() { anchor.classList.remove('copied'); }, 1400);
          });
        } else {
          window.location.hash = heading.id;
        }
      });
      heading.appendChild(anchor);
    });
  }

  function initPageTools() {
    initCodeBlocks();
    initHeadingPermalinks();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initPageTools);
  else initPageTools();
})();
</script>

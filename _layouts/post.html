---
layout: default
---

<div class="page">
  <header class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    <p class="page-meta">{{ page.date | date: "%b %-d, %Y" }}{% if page.author %} • {{ page.author }}{% endif %}{% if page.meta %} • {{ page.meta }}{% endif %}</p>
  </header>

  <article class="page-content post-content">
    {{ content }}
    {% include related-posts.html %}
  </article>
</div>

{% if site.enable_disqus %}
{% include disqus.html %}
{% endif %}

<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="none" />

  <style>
    .line { fill: none; stroke: #a8a29e; stroke-width: 1.5; stroke-linecap: round; }
    .line-faded { fill: none; stroke: #d6d3d1; stroke-width: 1.5; stroke-linecap: round; }
    .node { fill: #ffffff; stroke: #57534e; stroke-width: 1.5; }
    .node-faded { fill: #ffffff; stroke: #a8a29e; stroke-width: 1.5; }
    .text { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; font-size: 13px; fill: #57534e; letter-spacing: 0.3px; }
    .text-accent { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 500; fill: #c2410c; letter-spacing: 0.3px; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#c2410c" />
    </marker>
  </defs>

  <!-- Subtree Bounding Area -->
  <path d="M 330 320 L 620 230 C 670 270, 670 370, 620 410 Z" 
        fill="#f5f5f4" stroke="#d6d3d1" stroke-width="1.5" stroke-dasharray="6 4" stroke-linejoin="round" />

  <!-- Faded upper trees (Unchosen paths) -->
  <g>
    <!-- Edges -->
    <path class="line-faded" d="M 162 200 C 230 200, 230 80, 298 80" />
    <path class="line-faded" d="M 162 200 L 298 200" />
    
    <path class="line-faded" d="M 322 80 C 380 80, 380 50, 438 50" />
    <path class="line-faded" d="M 322 80 C 380 80, 380 110, 438 110" />
    
    <path class="line-faded" d="M 322 200 C 380 200, 380 170, 438 170" />
    <path class="line-faded" d="M 322 200 C 380 200, 380 230, 438 230" />
    
    <!-- Tiny continuation branches -->
    <path class="line-faded" d="M 456 50 L 480 40" />
    <path class="line-faded" d="M 456 50 L 480 60" />
    <path class="line-faded" d="M 456 110 L 480 100" />
    <path class="line-faded" d="M 456 110 L 480 120" />
    <path class="line-faded" d="M 456 170 L 480 160" />
    <path class="line-faded" d="M 456 170 L 480 180" />
    <path class="line-faded" d="M 456 230 L 480 220" />
    <path class="line-faded" d="M 456 230 L 480 240" />

    <!-- Nodes -->
    <circle class="node-faded" cx="310" cy="80" r="8" />
    <circle class="node-faded" cx="310" cy="200" r="8" />
    <circle class="node-faded" cx="450" cy="50" r="6" />
    <circle class="node-faded" cx="450" cy="110" r="6" />
    <circle class="node-faded" cx="450" cy="170" r="6" />
    <circle class="node-faded" cx="450" cy="230" r="6" />
  </g>

  <!-- Focused Tree Path -->
  <g>
    <!-- Edges -->
    <path class="line" d="M 162 200 C 230 200, 230 320, 298 320" />
    
    <path class="line" d="M 322 320 C 390 320, 390 280, 458 280" />
    <path class="line" d="M 322 320 C 390 320, 390 360, 458 360" />
    
    <path class="line" d="M 482 280 C 540 280, 540 260, 598 260" />
    <path class="line" d="M 482 280 C 540 280, 540 300, 598 300" />
    
    <path class="line" d="M 482 360 C 540 360, 540 340, 598 340" />
    <path class="line" d="M 482 360 C 540 360, 540 380, 598 380" />

    <!-- Tiny continuation branches -->
    <path class="line" d="M 616 260 L 640 252" />
    <path class="line" d="M 616 260 L 640 268" />
    
    <path class="line" d="M 616 300 L 640 292" />
    <path class="line" d="M 616 300 L 640 308" />
    
    <path class="line" d="M 616 340 L 640 332" />
    <path class="line" d="M 616 340 L 640 348" />
    
    <path class="line" d="M 616 380 L 640 372" />
    <path class="line" d="M 616 380 L 640 388" />

    <!-- Nodes -->
    <circle class="node" cx="470" cy="280" r="8" />
    <circle class="node" cx="470" cy="360" r="8" />
    
    <circle class="node" cx="610" cy="260" r="6" />
    <circle class="node" cx="610" cy="300" r="6" />
    <circle class="node" cx="610" cy="340" r="6" />
    <circle class="node" cx="610" cy="380" r="6" />
  </g>

  <!-- Root Node -->
  <circle cx="150" cy="200" r="12" fill="#ffffff" stroke="#57534e" stroke-width="2" />
  <circle cx="150" cy="200" r="5" fill="#57534e" />

  <!-- Local Decision Node (Highlighted) -->
  <circle cx="310" cy="320" r="12" fill="#ffffff" stroke="#c2410c" stroke-width="2.5" />
  <circle cx="310" cy="320" r="5" fill="#c2410c" />

  <!-- Free Energy Flow Arrow -->
  <path d="M 680 340 C 680 435, 400 440, 321 332" 
        fill="none" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)" />

  <!-- Labels -->
  <text x="150" y="165" text-anchor="middle" class="text">current state</text>
  <text x="290" y="360" text-anchor="end" class="text-accent">local decision</text>
  <text x="635" y="210" class="text">downstream subtree</text>
  <text x="680" y="330" class="text-accent">free energy</text>

</svg>
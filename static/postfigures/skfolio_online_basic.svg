<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" width="100%" height="100%">
  <!-- Definitions for Arrowheads -->
  <defs>
    <marker id="arrow-gray" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#3b3b3d" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#c2410c" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#fafaf9" />

  <!-- Center Divider -->
  <line x1="500" y1="80" x2="500" y2="470" stroke="#d4d4d4" stroke-width="1" stroke-dasharray="4 4" />

  <!-- Global Typography Styles -->
  <style>
    text {
      font-family: system-ui, -apple-system, sans-serif;
      fill: #3b3b3d;
    }
    .title { font-size: 16px; font-weight: 600; letter-spacing: 1px; }
    .subtitle { font-size: 10px; font-weight: 400; fill: #737373; letter-spacing: 0.5px; }
    .label { font-size: 12px; font-weight: 500; }
    .sublabel { font-size: 10px; font-weight: 400; fill: #737373; }
    .accent-text { fill: #c2410c; font-weight: 500; }
  </style>

  <!-- ========================================== -->
  <!-- LEFT PANEL: BATCH OPTIMIZATION             -->
  <!-- ========================================== -->

  <!-- Titles -->
  <text x="250" y="70" text-anchor="middle" class="title">Batch Optimization</text>
  <text x="250" y="95" text-anchor="middle" class="subtitle">Assumes Static distribution · Expected return max</text>

  <!-- Historical Data Matrix -->
  <text x="250" y="145" text-anchor="middle" class="label">historical window (static dataset)</text>
  <rect x="175" y="160" width="150" height="80" rx="3" fill="#ffffff" stroke="#3b3b3d" stroke-width="1.5" />
  <!-- Grid Lines -->
  <line x1="175" y1="180" x2="325" y2="180" stroke="#efefee" stroke-width="1.5" />
  <line x1="175" y1="200" x2="325" y2="200" stroke="#efefee" stroke-width="1.5" />
  <line x1="175" y1="220" x2="325" y2="220" stroke="#efefee" stroke-width="1.5" />
  <line x1="205" y1="160" x2="205" y2="240" stroke="#efefee" stroke-width="1.5" />
  <line x1="235" y1="160" x2="235" y2="240" stroke="#efefee" stroke-width="1.5" />
  <line x1="265" y1="160" x2="265" y2="240" stroke="#efefee" stroke-width="1.5" />
  <line x1="295" y1="160" x2="295" y2="240" stroke="#efefee" stroke-width="1.5" />
  <!-- Highlight a few "data" cells -->
  <rect x="205" y="180" width="30" height="20" fill="#ebebe9" />
  <rect x="265" y="200" width="30" height="20" fill="#ebebe9" />

  <!-- Arrow down from Data -->
  <line x1="250" y1="240" x2="250" y2="265" stroke="#3b3b3d" stroke-width="1.5" marker-end="url(#arrow-gray)" />

  <!-- Parameter Estimation Nodes -->
  <rect x="165" y="270" width="80" height="35" rx="3" fill="#ffffff" stroke="#a8a8aa" stroke-width="1.5" />
  <text x="205" y="292" text-anchor="middle" class="label">expected</text>
  <text x="205" y="306" text-anchor="middle" class="sublabel">returns</text>

  <rect x="255" y="270" width="80" height="35" rx="3" fill="#ffffff" stroke="#a8a8aa" stroke-width="1.5" />
  <text x="295" y="292" text-anchor="middle" class="label">covariance</text>
  <text x="295" y="306" text-anchor="middle" class="sublabel">matrix</text>

  <!-- Arrows to Solver -->
  <line x1="205" y1="305" x2="235" y2="335" stroke="#3b3b3d" stroke-width="1.5" marker-end="url(#arrow-gray)" />
  <line x1="295" y1="305" x2="265" y2="335" stroke="#3b3b3d" stroke-width="1.5" marker-end="url(#arrow-gray)" />

  <!-- Static Batch Solver Node -->
  <rect x="190" y="340" width="120" height="40" rx="4" fill="#ffffff" stroke="#3b3b3d" stroke-width="1.5" />
  <text x="250" y="360" text-anchor="middle" class="label">static solver</text>
  <text x="250" y="373" text-anchor="middle" class="sublabel">.fit(x)</text>

  <!-- Arrow to Final Weights -->
  <line x1="250" y1="380" x2="250" y2="415" stroke="#3b3b3d" stroke-width="1.5" marker-end="url(#arrow-gray)" />

  <!-- Output Portfolio Vector -->
  <rect x="175" y="420" width="150" height="20" rx="2" fill="#ffffff" stroke="#3b3b3d" stroke-width="1.5" />
  <line x1="205" y1="420" x2="205" y2="440" stroke="#3b3b3d" stroke-width="1" />
  <line x1="235" y1="420" x2="235" y2="440" stroke="#3b3b3d" stroke-width="1" />
  <line x1="265" y1="420" x2="265" y2="440" stroke="#3b3b3d" stroke-width="1" />
  <line x1="295" y1="420" x2="295" y2="440" stroke="#3b3b3d" stroke-width="1" />
  <!-- Fixed allocations shown as shaded bars -->
  <rect x="176" y="425" width="28" height="15" fill="#ebebe9" />
  <rect x="236" y="428" width="28" height="12" fill="#ebebe9" />
  <rect x="296" y="422" width="28" height="18" fill="#ebebe9" />
  
  <text x="250" y="460" text-anchor="middle" class="label">fixed portfolio weights</text>
  <text x="250" y="475" text-anchor="middle" class="sublabel">constant over out-of-sample</text>


  <!-- ========================================== -->
  <!-- RIGHT PANEL: ONLINE CONVEX OPTIMIZATION    -->
  <!-- ========================================== -->

  <!-- Titles -->
  <text x="750" y="70" text-anchor="middle" class="title">Online Convex Optimization</text>
  <text x="750" y="95" text-anchor="middle" class="subtitle">Sequential Adversarial Game · Regret Minimization</text>

  <!-- Streaming Blocks -->
  <!-- t-2 Block -->
  <rect x="610" y="130" width="40" height="20" rx="2" fill="#fafaf9" stroke="#d4d4d4" stroke-width="1.5" stroke-dasharray="2 2" />
  <text x="630" y="144" text-anchor="middle" class="sublabel" fill="#a8a8aa">t-2</text>
  
  <!-- t-1 Block -->
  <rect x="710" y="130" width="40" height="20" rx="2" fill="#fafaf9" stroke="#a8a8aa" stroke-width="1.5" stroke-dasharray="2 2" />
  <text x="730" y="144" text-anchor="middle" class="sublabel">t-1</text>
  
  <!-- t Block (Current) -->
  <rect x="810" y="130" width="40" height="20" rx="2" fill="#ffffff" stroke="#3b3b3d" stroke-width="1.5" />
  <text x="830" y="144" text-anchor="middle" class="label">t</text>

  <text x="685" y="120" class="sublabel">sequential stream</text>

  <!-- Arrow down from current time to market prices -->
  <line x1="830" y1="150" x2="830" y2="202" stroke="#3b3b3d" stroke-width="1.5" marker-end="url(#arrow-gray)" />

  <!-- Market Prices Vector x_t -->
  <text x="830" y="195" text-anchor="middle" class="sublabel">market prices x<tspan dy="2" font-size="8">t</tspan></text>
  <rect x="800" y="210" width="60" height="15" rx="2" fill="#ffffff" stroke="#3b3b3d" stroke-width="1.5" />
  <line x1="815" y1="210" x2="815" y2="225" stroke="#3b3b3d" stroke-width="1" />
  <line x1="830" y1="210" x2="830" y2="225" stroke="#3b3b3d" stroke-width="1" />
  <line x1="845" y1="210" x2="845" y2="225" stroke="#3b3b3d" stroke-width="1" />
  <rect x="816" y="211" width="13" height="13" fill="#ebebe9" />

  <!-- Portfolio Weights Vector w_t -->
  <text x="670" y="195" text-anchor="middle" class="sublabel">portfolio w<tspan dy="2" font-size="8">t</tspan></text>
  <rect x="640" y="210" width="60" height="15" rx="2" fill="#ffffff" stroke="#3b3b3d" stroke-width="1.5" />
  <line x1="655" y1="210" x2="655" y2="225" stroke="#3b3b3d" stroke-width="1" />
  <line x1="670" y1="210" x2="670" y2="225" stroke="#3b3b3d" stroke-width="1" />
  <line x1="685" y1="210" x2="685" y2="225" stroke="#3b3b3d" stroke-width="1" />
  <rect x="641" y="211" width="13" height="13" fill="#ebebe9" />
  <rect x="671" y="211" width="13" height="13" fill="#ebebe9" />

  <!-- Objective / Loss Function Node -->
  <rect x="690" y="275" width="120" height="36" rx="18" fill="#ffffff" stroke="#3b3b3d" stroke-width="1.5" />
  <text x="750" y="293" text-anchor="middle" class="label">Instantaneous loss</text>
  <text x="750" y="305" text-anchor="middle" class="sublabel">-log(w<tspan dy="2" font-size="8">t</tspan><tspan dy="-2">ᵀ x</tspan><tspan dy="2" font-size="8">t</tspan><tspan dy="-2">)</tspan></text>

  <!-- Arrows to Loss Function -->
  <line x1="670" y1="225" x2="720" y2="272" stroke="#3b3b3d" stroke-width="1.5" marker-end="url(#arrow-gray)" />
  <line x1="830" y1="225" x2="780" y2="272" stroke="#3b3b3d" stroke-width="1.5" marker-end="url(#arrow-gray)" />

  <!-- OCO Engine Node -->
  <rect x="690" y="365" width="120" height="45" rx="4" fill="#ffffff" stroke="#3b3b3d" stroke-width="1.5" />
  <text x="750" y="386" text-anchor="middle" class="label">OCO engine</text>
  <text x="750" y="400" text-anchor="middle" class="sublabel">Mirror Map Φ</text>

  <!-- Arrow Loss to Engine -->
  <line x1="750" y1="311" x2="750" y2="360" stroke="#3b3b3d" stroke-width="1.5" marker-end="url(#arrow-gray)" />
  <text x="756" y="340" class="sublabel">gradient g<tspan dy="2" font-size="8">t</tspan></text>

  <!-- Predictor Node -->
  <rect x="540" y="365" width="100" height="45" rx="4" fill="#ffffff" stroke="#a8a8aa" stroke-width="1.5" />
  <text x="590" y="386" text-anchor="middle" class="label">Predictor</text>
  <text x="590" y="400" text-anchor="middle" class="sublabel">Momentum</text>

  <!-- Arrow Predictor to Engine -->
  <line x1="640" y1="387.5" x2="685" y2="387.5" stroke="#3b3b3d" stroke-width="1.5" marker-end="url(#arrow-gray)" />
  <text x="662" y="380" text-anchor="middle" class="sublabel">Optimism</text>

  <!-- Dynamic Feedback Loop (Deep Orange Accent) -->
  <path d="M 750 410 L 750 455 Q 750 465 740 465 L 510 465 Q 500 465 500 455 L 500 227 Q 500 217 510 217 L 633 217" 
        fill="none" stroke="#c2410c" stroke-width="1.5" marker-end="url(#arrow-orange)" />
  
  <text x="620" y="457" text-anchor="middle" class="label accent-text">dynamic weight update w<tspan dy="2" font-size="9">t+1</tspan></text>

</svg>
- name: 'Networkqit'
  image: https://raw.githubusercontent.com/CarloNicolini/networkqit/master/doc/images/animation_ising_batchsize_128_eta1E-3_refresh_10_maxiter_5000_beta_5E-1.gif
  description: Network Quantum Information Theory toolbox
  documentation: 'https://networkqit.github.io'
  github: https://github.com/carlonicolini/networkqit
  fulldescription: 'Networkqit is a Python toolbox to perform model optimization and assessment within the spectral entropies of complex networks framework. You can install it with the `pip` package manager as it is hosted on the pypi repositories: `pip install networkqit`.'

- name: PACO
  image: /static/img/software/paco.png
  description: Partitioning Cost Optimization
  fulldescription: 'PACO is the second iteration of the FAGSO algorithm, written from scratch with better data structures implementation as well as the full support of the igraph library. PACO implements agglomerative optimization methods as well as simulated annealing, and its written in a modular fashion so optimization of cost functions of various type can be carried on in a series of subsequent steps. We suggest to download and use PACO instead of FAGSO as it is faster and supports a wider variety of quality functions, not only Surprise but also Asymptotical Surprise. Additionally it contains a Matlab wrapper for Infomap community detection.'
  github: 'https://github.com/carlonicolini/paco'
  downloadform: 'http://forms.iit.it/view.php?id=68447'
  
- name: FAGSO
  image: /static/img/software/fagso.png
  description: Fast Agglomerative Surprise Optimization
  releases: 'https://github.com/CarloNicolini/fagso/releases/'
  documentation: 'static/doc/fagso.pdf'
  github: https://github.com/carlonicolini/fagso
  fulldescription: 'FAGSO is an agglomerative Surprise Optimization algorithm written in C++ with bindings as MEX MATLAB and Octave file as well as Python library. It comes as the first proof of concept implementation of the idea, and accompanies the paper *Modular structure of brain functional connectivity: breaking the resolution limit by Surprise*. All the documentation on how to compile and use FAGSO is indicated on the github webpage. '

- name: CommunityAlg
  image: /static/img/software/community_detection.jpg
  description: Collections of Matlab functions useful for community detection.
  github: https://github.com/carlonicolini/communityalg
  fulldescription: 'CommunityAlg is a set of Matlab functions for the analysis of complex networks and it extends largely the Brain connectivity Toolbox (BCT) by Sporns and Rubinov. CommunityAlg at the moment is a moving target and the implementations of the methods may change in the future as well as their signatures.'
  documentation: '/static/doc/communityalg.pdf'
  
- name: CNCSVision
  image: /static/img/eyeicon.png
  github: https://github.com/carlonicolini/cncsvision
  description: A library for experiments in visual perception, psychophysics and visualization.
  fulldescription: CNCSVision makes it possible to simulate interactive three-dimensional environments. It connects all the facilities necessary in a research lab of vision science, with head tracking and haptic/psychophysics perception. CNCSVision was developed in the laboraties of IIT in Rovereto, under the supervision of Prof. Fulvio Domini.

- name: LFRWMX
  image: /static/img/software/lfr.png
  description: A Matlab wrapper around the Lancichinetti-Fortunato-Radicchi benchmark network generator
  github: https://github.com/carlonicolini/lfrwmx
  fulldescription: LFR is an implementations of the planted partition model where the degrees and the community size is modeled after powerlaws with specific exponents. This implementation is a Matlab wrapper around the LFR Weighted with non overlapping communities that is available on the website of Santo Fortunato.
  documentation: '/static/doc/lfrwmx.pdf'

- name: InfomapMex
  image: /static/img/software/infomapmx.png
  description: 'A Matlab wrapper around the latest available implementation of Rosvall and Bergstroms Infomap code available on <a href="http://github.com/mapequation/infomap">github</a>.'
  fulldescription: 'Infomap optimizes the map equation, which exploits the information-theoretic duality between the problem of compressing data, and the problem of detecting and extracting significant patterns or structures within those data. Specifically, the map equation is a flow-based method and operates on dynamics on the network.'
  github: https://github.com/carlonicolini/infomapmex
  documentation: '/static/doc/infomapmex.pdf'

- name: MultilouvainMX
  image: /static/img/software/multilouvain.png
  description: 'A Matlab wrapper around the Traag louvain python package.'
  fulldescription: 'Multilouvain comes a C++ library and a Matlab mex wrapper that is able to optimize different quality functions for community detection on graphs. Multilouvain features Asymptotical Surprise, Significance, Reichardt and Bornholdt, CPM and Newman modularity in a single unified framework. All the credits for the C++ code are to <a href="http://www.traag.net">Vincent Traag</a>. This wrapper modified some functions to make faster calls to methods and the code is not completely equal, though.'
  github: 'https://github.com/carlonicolini/multilouvain'
  documentation: '/static/doc/multilouvain.pdf'

- name: Hyperquick
  image: https://upload.wikimedia.org/wikipedia/commons/c/c1/HypergeometricPDF.png
  description: 'Hyperquick is a C++ implementation of the hyperquick method.'
  fulldescription: 'Hyperquick computes  the hypergeometric distribution pdf efficiently and without under/overflows.'
  github: https://github.com/carlonicolini/hyperquick
  documentation: ''

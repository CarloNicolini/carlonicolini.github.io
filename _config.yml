# Site settings
title: 'Carlo Nicolini'
author:
  name: Carlo Nicolini
email: "c.nicolini@ipazia.com"
description: "Personal blog about artificial intelligence, coding, statistical physics, network theory and science in general"
logo: "/static/img/foto_nicolini.jpeg"
baseurl: ""
url: "https://carlonicolini.github.io"
github_username:  carlonicolini
google-analytics: UA-90756713-1
collections:
- well-known

exclude:
  - scripts

# Build settings
markdown: kramdown
kramdown:
  auto_ids: true
  toc_levels: 1..6
keep_files: [MathJax]
enable_disqus: true 
plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-relative-links
  - jekyll-scholar

# Open Graph / Twitter: default card when a post has an image (see defaults below).
twitter:
  card: summary_large_image

# Per-post `description` in front matter is best for SERP snippets; jekyll-seo-tag falls
# back to `excerpt`, then site.description, when `description` is omitted.
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      image: /static/img/foto_nicolini.jpeg
  - scope:
      path: "sections/science/_posts"
    values:
      permalink: "/sections/science/:year/:month/:day/:title:output_ext"

scholar:
  style: apa
  locale: en
  sort_by: none
  order: ascending
  group_by: none
  bibliography_list_tag: ul
  bibliography_item_tag: li
  bibliography: bibliography.bib
  bibliography_dir: '_bibliography'
  analytics_id: ~
  
social:
  name: Carlo Nicolini
  links:
    - https://www.linkedin.com/in/carlo-nicolini
    - https://github.com/carlonicolini